<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ADHD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="top-box">
            <span id="current-time">Current Time/Data</span>
        </div>
        <div class="top-box title-box">
            <div>ADHD "Alert Drago Help Desk"</div>
        </div>
    </div>

    <div class="table-wrapper">
        <iframe id="requests-frame" src="requests.html" title="Заявки"></iframe>
    </div>

    <button class="bottom-button" onclick="openModal()">
        Подати заявку
    </button>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Нова заявка</h2>
            <form id="requestForm">
                <label for="room">Номер аудиторії:</label>
                <input type="text" id="room" name="room" required 
                       pattern="^[0-9]{1,4}[а-яА-Яa-zA-ZіІїЇєЄґҐ]?$" 
                       title="Наприклад: 305 або 101а">

                <label for="applicant">Заявник:</label>
                <input type="text" id="applicant" name="applicant" required>

                <label for="description">Опис:</label>
                <textarea id="description" name="description" required></textarea>

                <div class="form-buttons">
                    <button type="button" onclick="closeModal()">Скасувати</button>
                    <button type="submit">Подати</button>
                </div>
            </form>
        </div>
    </div>

    <script src="CurrentTimeData.js"></script>
    <script src="popup.js"></script>
    <script src="api.js"></script>
</body>
</html>
